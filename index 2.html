<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gift Tracker</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:var(--tg-theme-bg-color,#0f0f1a);
      --text:var(--tg-theme-text-color,#e8e8f0);
      --hint:var(--tg-theme-hint-color,#6b6b80);
      --link:var(--tg-theme-link-color,#5eabf7);
      --btn:var(--tg-theme-button-color,#5eabf7);
      --btn-text:var(--tg-theme-button-text-color,#fff);
      --sec-bg:var(--tg-theme-secondary-bg-color,#1a1a2e);
      --gold:#f0c040;--green:#4caf50;--red:#f44336;
    }
    body{
      font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;overflow-x:hidden;
    }

    /* ===== NAV ===== */
    .nav{
      position:fixed;bottom:0;left:0;right:0;z-index:200;
      background:var(--sec-bg);
      border-top:1px solid rgba(255,255,255,0.06);
      display:flex;padding:6px 0 env(safe-area-inset-bottom,6px);
    }
    .nav-btn{
      flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
      background:none;border:none;color:var(--hint);
      font-size:10px;font-weight:700;font-family:inherit;
      padding:6px 0;cursor:pointer;transition:color .2s;position:relative;
    }
    .nav-btn.active{color:var(--btn)}
    .nav-btn svg{width:22px;height:22px;fill:currentColor}
    .nav-badge{
      position:absolute;top:2px;right:calc(50% - 18px);
      background:var(--red);color:#fff;font-size:9px;font-weight:800;
      min-width:16px;height:16px;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      padding:0 4px;
    }
    .nav-badge:empty,.nav-badge[data-count="0"]{display:none}

    /* ===== PAGES ===== */
    .page{display:none;padding:12px 16px 80px}
    .page.active{display:block}

    /* ===== HEADER ===== */
    .page-hdr{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:16px;padding-top:4px;
    }
    .page-hdr h1{font-size:22px;font-weight:800;letter-spacing:-.4px}
    .status-pill{
      background:rgba(76,175,80,.12);color:var(--green);
      padding:4px 10px;border-radius:16px;
      font-size:10px;font-weight:700;
      display:flex;align-items:center;gap:4px;
    }
    .status-pill .dot{
      width:5px;height:5px;border-radius:50%;background:var(--green);
      animation:blink 1.8s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    /* ===== SEARCH ===== */
    .search-row{display:flex;gap:8px;margin-bottom:18px}
    .search-input{
      flex:1;background:var(--sec-bg);border:2px solid transparent;
      border-radius:12px;padding:12px 14px;
      font-size:14px;font-family:inherit;font-weight:600;
      color:var(--text);outline:none;transition:border-color .2s;
    }
    .search-input::placeholder{color:var(--hint)}
    .search-input:focus{border-color:var(--btn)}
    .search-add{
      background:var(--btn);color:var(--btn-text);border:none;
      border-radius:12px;width:46px;
      font-size:24px;font-weight:800;cursor:pointer;
      font-family:inherit;transition:transform .15s;
      display:flex;align-items:center;justify-content:center;
    }
    .search-add:active{transform:scale(.9)}

    /* ===== TRACKED ACCOUNTS GRID ===== */
    .section-label{
      font-size:11px;font-weight:700;color:var(--hint);
      text-transform:uppercase;letter-spacing:.6px;
      margin-bottom:10px;
    }
    .accounts-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(72px,1fr));
      gap:10px;margin-bottom:20px;
    }
    .acc-item{
      display:flex;flex-direction:column;align-items:center;
      gap:4px;cursor:pointer;position:relative;
      animation:popIn .3s ease-out both;
    }
    @keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

    .acc-avatar{
      width:52px;height:52px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:20px;font-weight:800;color:#fff;
      position:relative;flex-shrink:0;
      transition:transform .2s;
    }
    .acc-item:active .acc-avatar{transform:scale(.92)}

    .acc-avatar img{
      width:100%;height:100%;border-radius:50%;object-fit:cover;
    }

    .bell-indicator{
      position:absolute;bottom:-1px;right:-1px;
      width:20px;height:20px;border-radius:50%;
      background:var(--bg);
      display:flex;align-items:center;justify-content:center;
      font-size:11px;
    }
    .bell-indicator.on{color:var(--gold)}
    .bell-indicator.off{color:var(--hint)}

    .acc-name{
      font-size:10px;font-weight:700;color:var(--hint);
      max-width:72px;overflow:hidden;text-overflow:ellipsis;
      white-space:nowrap;text-align:center;
    }

    /* ===== ACCOUNT DETAIL (overlay) ===== */
    .overlay{
      position:fixed;top:0;left:0;right:0;bottom:0;
      background:var(--bg);z-index:150;
      transform:translateX(100%);transition:transform .3s ease;
      overflow-y:auto;padding:0 16px 40px;
    }
    .overlay.open{transform:translateX(0)}

    .detail-header{
      display:flex;align-items:center;gap:12px;
      padding:16px 0;position:sticky;top:0;
      background:var(--bg);z-index:10;
    }
    .back-btn{
      width:36px;height:36px;border-radius:10px;
      background:var(--sec-bg);border:none;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;
    }
    .back-btn svg{width:20px;height:20px;fill:var(--text)}
    .detail-user{flex:1;min-width:0}
    .detail-user .name{font-size:16px;font-weight:800}
    .detail-user .sub{font-size:12px;color:var(--hint)}

    .detail-actions{display:flex;gap:8px}
    .action-btn{
      width:38px;height:38px;border-radius:10px;border:none;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:all .2s;
    }
    .action-btn svg{width:20px;height:20px}
    .action-btn.bell{background:rgba(240,192,64,.12)}
    .action-btn.bell.on svg{fill:var(--gold)}
    .action-btn.bell.off svg{fill:var(--hint)}
    .action-btn.del{background:rgba(244,67,54,.1)}
    .action-btn.del svg{fill:var(--red)}
    .action-btn:active{transform:scale(.88)}

    /* ===== GIFT LIST ===== */
    .gift-card{
      background:var(--sec-bg);border-radius:14px;
      padding:12px 14px;margin-bottom:8px;
      position:relative;overflow:hidden;
      animation:slideUp .3s ease-out both;
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    .gift-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2.5px;
    }
    .gift-card.r-common::before{background:linear-gradient(90deg,#78909c,#b0bec5)}
    .gift-card.r-rare::before{background:linear-gradient(90deg,#42a5f5,#29b6f6)}
    .gift-card.r-epic::before{background:linear-gradient(90deg,#ab47bc,#ce93d8)}
    .gift-card.r-legendary::before{background:linear-gradient(90deg,var(--gold),#ff9800)}

    .gift-top{display:flex;align-items:center;gap:10px}
    .gift-ico{
      width:42px;height:42px;border-radius:11px;
      display:flex;align-items:center;justify-content:center;
      font-size:20px;flex-shrink:0;
    }
    .r-common .gift-ico{background:rgba(120,144,156,.1)}
    .r-rare .gift-ico{background:rgba(66,165,245,.1)}
    .r-epic .gift-ico{background:rgba(171,71,188,.1)}
    .r-legendary .gift-ico{background:rgba(240,192,64,.1)}

    .gift-info{flex:1;min-width:0}
    .gift-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px}
    .gift-coll{font-size:11px;color:var(--hint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .gift-from{font-size:11px;color:var(--link);font-weight:600}

    .rbadge{
      font-size:8px;font-weight:800;padding:2px 5px;border-radius:4px;
      text-transform:uppercase;letter-spacing:.3px;
    }
    .r-common .rbadge{background:rgba(120,144,156,.2);color:#b0bec5}
    .r-rare .rbadge{background:rgba(66,165,245,.2);color:#42a5f5}
    .r-epic .rbadge{background:rgba(171,71,188,.2);color:#ce93d8}
    .r-legendary .rbadge{background:rgba(240,192,64,.2);color:var(--gold)}

    .gift-bottom{
      display:flex;align-items:center;justify-content:space-between;
      margin-top:8px;padding-top:8px;
      border-top:1px solid rgba(255,255,255,.04);
    }
    .gift-time{font-size:10px;color:var(--hint);font-weight:600}
    .gift-price{font-size:12px;font-weight:800;display:flex;align-items:center;gap:3px}
    .ton-tag{
      background:linear-gradient(135deg,#0098ea,#00c2ff);
      color:#fff;font-size:8px;font-weight:800;
      padding:1px 4px;border-radius:3px;
    }

    .day-lbl{
      font-size:10px;font-weight:700;color:var(--hint);
      text-transform:uppercase;letter-spacing:.7px;
      padding:12px 2px 6px;
    }

    /* ===== FEED PAGE ===== */
    .feed-card{
      background:var(--sec-bg);border-radius:14px;
      padding:12px 14px;margin-bottom:8px;
      display:flex;align-items:center;gap:10px;
      animation:slideUp .3s ease-out both;
    }
    .feed-av{
      width:38px;height:38px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:15px;font-weight:800;color:#fff;flex-shrink:0;
    }
    .feed-av img{width:100%;height:100%;border-radius:50%;object-fit:cover}
    .feed-body{flex:1;min-width:0}
    .feed-line1{font-size:13px;font-weight:700}
    .feed-line1 .hl{color:var(--link)}
    .feed-line2{font-size:11px;color:var(--hint);margin-top:1px}
    .feed-time{font-size:10px;color:var(--hint);font-weight:600;flex-shrink:0}

    /* ===== EMPTY ===== */
    .empty{text-align:center;padding:50px 20px}
    .empty .ico{font-size:48px;margin-bottom:12px;animation:floaty 3s ease-in-out infinite}
    @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .empty h3{font-size:16px;font-weight:800;margin-bottom:5px}
    .empty p{font-size:12px;color:var(--hint);line-height:1.5}

    /* ===== TOAST ===== */
    .toast{
      position:fixed;top:-60px;left:50%;transform:translateX(-50%);
      background:var(--btn);color:var(--btn-text);
      padding:9px 20px;border-radius:20px;
      font-size:12px;font-weight:700;z-index:300;
      box-shadow:0 4px 20px rgba(0,0,0,.3);
      transition:top .4s cubic-bezier(.34,1.56,.64,1);
      white-space:nowrap;max-width:92%;overflow:hidden;text-overflow:ellipsis;
    }
    .toast.show{top:14px}
    .toast.err{background:var(--red)}

    /* Avatar colors */
    .c0{background:linear-gradient(135deg,#f06292,#e91e63)}
    .c1{background:linear-gradient(135deg,#42a5f5,#1e88e5)}
    .c2{background:linear-gradient(135deg,#66bb6a,#43a047)}
    .c3{background:linear-gradient(135deg,#ffa726,#fb8c00)}
    .c4{background:linear-gradient(135deg,#ab47bc,#8e24aa)}
    .c5{background:linear-gradient(135deg,#26c6da,#00acc1)}
    .c6{background:linear-gradient(135deg,#ef5350,#e53935)}
    .c7{background:linear-gradient(135deg,#5c6bc0,#3949ab)}

    /* Loading spinner */
    .spinner{
      width:24px;height:24px;border:3px solid var(--sec-bg);
      border-top-color:var(--btn);border-radius:50%;
      animation:spin .7s linear infinite;margin:30px auto;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ========== PAGE: ОТСЛЕЖИВАЕМЫЕ ========== -->
<div class="page active" id="pageAccounts">
  <div class="page-hdr">
    <h1>👁 Отслеживание</h1>
    <div class="status-pill"><div class="dot"></div>Live</div>
  </div>

  <div class="search-row">
    <input class="search-input" id="inputUser" type="text" placeholder="Введите @username" autocomplete="off" spellcheck="false">
    <button class="search-add" onclick="addAccount()">+</button>
  </div>

  <div id="accountsSection"></div>
</div>

<!-- ========== PAGE: ЛЕНТА ========== -->
<div class="page" id="pageFeed">
  <div class="page-hdr">
    <h1>🎁 Лента</h1>
  </div>
  <div id="feedSection"></div>
</div>

<!-- ========== OVERLAY: ACCOUNT DETAIL ========== -->
<div class="overlay" id="detailOverlay">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div class="detail-user">
      <div class="name" id="detailName"></div>
      <div class="sub" id="detailSub"></div>
    </div>
    <div class="detail-actions">
      <button class="action-btn bell" id="detailBell" onclick="toggleBellDetail()">
        <svg viewBox="0 0 24 24"><path id="bellPath" d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      </button>
      <button class="action-btn del" onclick="removeFromDetail()">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
    </div>
  </div>
  <div id="detailGifts"></div>
</div>

<!-- ========== NAV ========== -->
<nav class="nav">
  <button class="nav-btn active" onclick="switchPage('pageAccounts',this)">
    <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    Аккаунты
  </button>
  <button class="nav-btn" onclick="switchPage('pageFeed',this)">
    <svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83 8.62 12 11 8.76l1-1.36 1 1.36L15.38 12 17 10.83 14.92 8H20v6z"/></svg>
    <span class="nav-badge" id="feedBadge"></span>
    Лента
  </button>
</nav>

<script>
// ===== Telegram WebApp =====
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();try{tg.setHeaderColor('secondary_bg_color')}catch(e){}}
const tgUser = tg?.initDataUnsafe?.user;

// ===== CONFIG — see.tg API =====
const API_BASE = 'https://poso.see.tg/api'; // Базовый URL API
// TODO: вставить реальные эндпоинты после получения документации
// Примерная структура:
// GET  /gifts?owner={username}     — подарки пользователя
// GET  /user/{username}            — инфо о пользователе
// GET  /gifts/transfers?owner={username}  — трансферы

// ===== State =====
let accounts = [];   // {username, bellOn, avatarUrl, displayName}
let allGifts = [];   // {id, emoji, name, collection, rarity, from, to, price, time}
let currentDetail = null;
let unseenFeed = 0;

// Persist
function load(){
  try{
    const a=localStorage.getItem('gta');if(a)accounts=JSON.parse(a);
    const g=localStorage.getItem('gtg');if(g)allGifts=JSON.parse(g).map(x=>({...x,time:new Date(x.time)}));
  }catch(e){}
}
function save(){
  try{localStorage.setItem('gta',JSON.stringify(accounts));localStorage.setItem('gtg',JSON.stringify(allGifts))}catch(e){}
}
load();

// ===== Helpers =====
function toast(msg,err){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(err?' err':'')+' show';
  setTimeout(()=>t.classList.remove('show'),3000);
}

function haptic(type){
  try{if(tg?.HapticFeedback)tg.HapticFeedback[type==='n'?'notificationOccurred':'impactOccurred'](type==='n'?'success':'light')}catch(e){}
}

function colorClass(username){return 'c'+((username||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0)%8)}

function avatarHTML(acc,size){
  const s=size||52;
  if(acc.avatarUrl){
    return `<img src="${acc.avatarUrl}" alt="" style="width:${s}px;height:${s}px;border-radius:50%;object-fit:cover">`;
  }
  return `<div class="acc-avatar ${colorClass(acc.username)}" style="width:${s}px;height:${s}px;font-size:${Math.round(s*.38)}px">${(acc.displayName||acc.username)[0].toUpperCase()}</div>`;
}

function fmtTime(d){
  if(!(d instanceof Date))d=new Date(d);
  const m=Math.floor((Date.now()-d.getTime())/60000);
  if(m<1)return'сейчас';if(m<60)return m+'м';
  if(m<1440)return Math.floor(m/60)+'ч';
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
}

function dayLabel(d){
  if(!(d instanceof Date))d=new Date(d);
  const t=new Date();
  if(d.toDateString()===t.toDateString())return'Сегодня';
  const y=new Date(t);y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString())return'Вчера';
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
}

// ===== API Calls (заглушки — заменить на реальные) =====

async function fetchUserInfo(username){
  // TODO: GET ${API_BASE}/user/${username}
  // Возвращает: {username, displayName, avatarUrl, ...}
  // Пока возвращаем заглушку:
  return {
    username,
    displayName: username,
    avatarUrl: null // Реальный API вернёт URL аватарки
  };
}

async function fetchGiftsForUser(username){
  // TODO: GET ${API_BASE}/gifts?owner=${username}
  // Возвращает массив подарков: [{id, name, collection, rarity, emoji, from, price, time}, ...]
  // Пока генерируем демо-данные:
  return generateDemoGifts(username);
}

// Polling / WebSocket для новых подарков
async function pollNewGifts(){
  // TODO: Реальный polling:
  // for(const acc of accounts){
  //   const gifts = await fetch(`${API_BASE}/gifts/transfers?owner=${acc.username}&since=${lastCheck}`);
  //   // обработать новые подарки
  // }
  // Пока симулируем:
  if(accounts.length>0){
    simulateNewGift();
  }
  setTimeout(pollNewGifts, 15000+Math.random()*20000);
}

// ===== Demo Data =====
const NFT=[
  {emoji:'🌟',name:'Gold Star',collection:'Telegram Stars',rarity:'legendary',price:850},
  {emoji:'🎄',name:'Christmas Tree',collection:'Holiday Special',rarity:'epic',price:420},
  {emoji:'🐉',name:'Dragon',collection:'Mystic Beasts',rarity:'legendary',price:1200},
  {emoji:'💠',name:'Blue Crystal',collection:'Gem Stones',rarity:'rare',price:180},
  {emoji:'🎭',name:'Theatre Mask',collection:'Art Collection',rarity:'epic',price:350},
  {emoji:'🦋',name:'Butterfly',collection:'Nature Wonders',rarity:'rare',price:150},
  {emoji:'🏰',name:'Castle',collection:'Medieval Set',rarity:'legendary',price:2100},
  {emoji:'🌸',name:'Sakura',collection:'Japan Series',rarity:'common',price:45},
  {emoji:'👑',name:'Crown',collection:'Royal Set',rarity:'legendary',price:1800},
  {emoji:'🌈',name:'Rainbow',collection:'Nature Wonders',rarity:'rare',price:200},
  {emoji:'🦄',name:'Unicorn',collection:'Mystic Beasts',rarity:'epic',price:550},
  {emoji:'🔮',name:'Crystal Ball',collection:'Magic Set',rarity:'rare',price:230},
];
const SENDERS=['@whale','@collector','@nft_fan','@star_buyer','@ton_lord','@crypto_king','@gem_hunter','@gift_sniper'];
const pick=a=>a[Math.floor(Math.random()*a.length)];

function generateDemoGifts(username){
  const count=3+Math.floor(Math.random()*5);
  const gifts=[];
  for(let i=0;i<count;i++){
    const nft=pick(NFT);
    gifts.push({
      id:Math.random().toString(36).slice(2),
      ...nft,from:pick(SENDERS),to:username,
      time:new Date(Date.now()-(i*3600000+Math.random()*7200000))
    });
  }
  return gifts;
}

function simulateNewGift(){
  const acc=pick(accounts);
  const nft=pick(NFT);
  const g={id:Math.random().toString(36).slice(2),...nft,from:pick(SENDERS),to:acc.username,time:new Date()};
  allGifts.unshift(g);
  if(allGifts.length>200)allGifts=allGifts.slice(0,200);
  save();

  if(acc.bellOn){
    toast(`🎁 ${nft.emoji} ${nft.name} → @${acc.username}`);
    haptic('n');
    // TODO: В продакшене уведомление отправляется через бота, не через toast
  }

  unseenFeed++;
  updateFeedBadge();
  if(document.getElementById('pageFeed').classList.contains('active'))renderFeed();
  if(currentDetail===acc.username)renderDetailGifts(acc.username);
}

// ===== Nav =====
function switchPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(id==='pageFeed'){unseenFeed=0;updateFeedBadge();renderFeed()}
  if(id==='pageAccounts')renderAccounts();
}

function updateFeedBadge(){
  const b=document.getElementById('feedBadge');
  b.textContent=unseenFeed>0?unseenFeed:'';
  b.setAttribute('data-count',unseenFeed);
}

// ===== Add Account =====
async function addAccount(){
  const inp=document.getElementById('inputUser');
  let u=inp.value.trim().replace(/^@/,'');
  if(!u){toast('Введите @username',true);return}
  if(u.length<3){toast('Слишком короткий',true);return}
  if(accounts.find(a=>a.username.toLowerCase()===u.toLowerCase())){toast('Уже отслеживается',true);return}

  // Fetch user info from API
  const info = await fetchUserInfo(u);
  accounts.push({username:u, bellOn:true, avatarUrl:info.avatarUrl, displayName:info.displayName});
  inp.value='';
  save();
  renderAccounts();
  toast('🔔 @'+u+' добавлен');
  haptic('n');

  // Load initial gifts
  const gifts = await fetchGiftsForUser(u);
  allGifts=gifts.concat(allGifts);
  allGifts.sort((a,b)=>new Date(b.time)-new Date(a.time));
  save();
}

document.getElementById('inputUser').addEventListener('keydown',e=>{if(e.key==='Enter')addAccount()});

// ===== Toggle Bell =====
function toggleBell(username){
  const a=accounts.find(a=>a.username===username);
  if(a){a.bellOn=!a.bellOn;save();renderAccounts();haptic('i')}
}

// ===== Remove Account =====
function removeAccount(username){
  accounts=accounts.filter(a=>a.username!==username);
  allGifts=allGifts.filter(g=>g.to!==username);
  save();renderAccounts();
  toast('Удалён @'+username);haptic('i');
}

// ===== Render Accounts Grid =====
function renderAccounts(){
  const el=document.getElementById('accountsSection');
  if(!accounts.length){
    el.innerHTML=`<div class="empty"><div class="ico">👀</div><h3>Нет отслеживаемых</h3><p>Добавьте @username чтобы<br>следить за NFT-подарками</p></div>`;
    return;
  }

  let html=`<div class="section-label">Отслеживаемые аккаунты · ${accounts.length}</div><div class="accounts-grid">`;
  accounts.forEach((acc,i)=>{
    html+=`
      <div class="acc-item" style="animation-delay:${i*.04}s" onclick="openDetail('${acc.username}')">
        <div style="position:relative">
          ${avatarHTML(acc,52)}
          <div class="bell-indicator ${acc.bellOn?'on':'off'}">${acc.bellOn?'🔔':'🔕'}</div>
        </div>
        <div class="acc-name">@${acc.username}</div>
      </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

// ===== Account Detail =====
function openDetail(username){
  currentDetail=username;
  const acc=accounts.find(a=>a.username===username);
  if(!acc)return;

  document.getElementById('detailName').textContent='@'+acc.username;
  document.getElementById('detailSub').textContent=acc.bellOn?'🔔 Уведомления включены':'🔕 Уведомления выключены';

  const bellBtn=document.getElementById('detailBell');
  bellBtn.className='action-btn bell '+(acc.bellOn?'on':'off');

  renderDetailGifts(username);
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail(){
  currentDetail=null;
  document.getElementById('detailOverlay').classList.remove('open');
}

function toggleBellDetail(){
  if(!currentDetail)return;
  toggleBell(currentDetail);
  const acc=accounts.find(a=>a.username===currentDetail);
  if(acc){
    document.getElementById('detailSub').textContent=acc.bellOn?'🔔 Уведомления включены':'🔕 Уведомления выключены';
    document.getElementById('detailBell').className='action-btn bell '+(acc.bellOn?'on':'off');
  }
}

function removeFromDetail(){
  if(!currentDetail)return;
  removeAccount(currentDetail);
  closeDetail();
}

function renderDetailGifts(username){
  const el=document.getElementById('detailGifts');
  const gifts=allGifts.filter(g=>g.to===username).sort((a,b)=>new Date(b.time)-new Date(a.time));

  if(!gifts.length){
    el.innerHTML=`<div class="empty"><div class="ico">🎁</div><h3>Пока нет подарков</h3><p>Новые NFT-подарки появятся здесь</p></div>`;
    return;
  }

  let html='',lastDay='';
  gifts.forEach((g,i)=>{
    const dl=dayLabel(g.time);
    if(dl!==lastDay){html+=`<div class="day-lbl">${dl}</div>`;lastDay=dl}
    html+=`
      <div class="gift-card r-${g.rarity}" style="animation-delay:${i*.03}s">
        <div class="gift-top">
          <div class="gift-ico">${g.emoji}</div>
          <div class="gift-info">
            <div class="gift-title">${g.name} <span class="rbadge">${{legendary:'🌟 LEGEND',epic:'💎 EPIC',rare:'💠 RARE',common:'⚪'}[g.rarity]}</span></div>
            <div class="gift-coll">${g.collection}</div>
            <div class="gift-from">от ${g.from}</div>
          </div>
        </div>
        <div class="gift-bottom">
          <div class="gift-time">${fmtTime(g.time)}</div>
          <div class="gift-price"><span class="ton-tag">TON</span> ${g.price.toLocaleString()}</div>
        </div>
      </div>`;
  });
  el.innerHTML=html;
}

// ===== Render Feed (all gifts across all tracked accounts) =====
function renderFeed(){
  const el=document.getElementById('feedSection');
  const sorted=[...allGifts].sort((a,b)=>new Date(b.time)-new Date(a.time));

  if(!sorted.length){
    el.innerHTML=`<div class="empty"><div class="ico">📭</div><h3>Лента пуста</h3><p>Добавьте аккаунты для отслеживания<br>и подарки появятся здесь</p></div>`;
    return;
  }

  let html='',lastDay='';
  sorted.slice(0,50).forEach((g,i)=>{
    const dl=dayLabel(g.time);
    if(dl!==lastDay){html+=`<div class="day-lbl">${dl}</div>`;lastDay=dl}

    const acc=accounts.find(a=>a.username===g.to);
    html+=`
      <div class="feed-card" style="animation-delay:${i*.03}s" onclick="openDetail('${g.to}')">
        <div class="feed-av ${colorClass(g.to)}" style="width:38px;height:38px;font-size:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800">${(g.to||'?')[0].toUpperCase()}</div>
        <div class="feed-body">
          <div class="feed-line1">${g.emoji} ${g.name} → <span class="hl">@${g.to}</span></div>
          <div class="feed-line2">от ${g.from} · ${g.collection}</div>
        </div>
        <div class="feed-time">${fmtTime(g.time)}</div>
      </div>`;
  });
  el.innerHTML=html;
}

// ===== Init =====
renderAccounts();
updateFeedBadge();
setTimeout(pollNewGifts,8000);
</script>
</body>
</html>
