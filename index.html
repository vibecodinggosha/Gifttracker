<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gift Tracker</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--bg:var(--tg-theme-bg-color,#0f0f1a);--text:var(--tg-theme-text-color,#e8e8f0);--hint:var(--tg-theme-hint-color,#6b6b80);--link:var(--tg-theme-link-color,#5eabf7);--btn:var(--tg-theme-button-color,#5eabf7);--btn-text:var(--tg-theme-button-text-color,#fff);--sec-bg:var(--tg-theme-secondary-bg-color,#1a1a2e);--gold:#f0c040;--green:#4caf50;--red:#f44336;--purple:#ab47bc}
    body{font-family:'Nunito',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    .page{padding:12px 16px 40px}
    .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-top:4px}
    .hdr h1{font-size:20px;font-weight:800}
    .pill{background:rgba(76,175,80,.12);color:var(--green);padding:4px 10px;border-radius:16px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:4px}
    .pill .dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:bl 1.8s ease-in-out infinite}
    @keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
    .row{display:flex;gap:8px;margin-bottom:10px}
    .inp{flex:1;background:var(--sec-bg);border:2px solid transparent;border-radius:12px;padding:11px 14px;font-size:14px;font-family:inherit;font-weight:600;color:var(--text);outline:none}.inp::placeholder{color:var(--hint)}.inp:focus{border-color:var(--btn)}
    .btn-add{background:var(--btn);color:var(--btn-text);border:none;border-radius:12px;width:46px;font-size:22px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .btn-add:active{transform:scale(.9)}
    .lbl{font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 8px}
    .acc-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
    .acc-chip{background:var(--sec-bg);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
    .acc-chip .dot{width:8px;height:8px;border-radius:50%}
    .acc-chip .rm{color:var(--red);cursor:pointer;margin-left:4px;font-size:14px;font-weight:800}
    .chip{display:inline-block;background:var(--sec-bg);border-radius:8px;padding:5px 8px;margin:2px;font-size:10px;font-weight:600;color:var(--hint)}

    /* Transfer cards */
    .t-card{background:var(--sec-bg);border-radius:14px;padding:12px;margin-bottom:10px;border-left:3px solid transparent}
    .t-card.tracked{border-left-color:var(--gold)}
    .t-card.matched{border-left-color:var(--green);background:rgba(76,175,80,.05)}
    .t-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .t-icon{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .t-info{flex:1;min-width:0}
    .t-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .t-num{font-size:11px;color:var(--hint)}
    .t-flow{display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:4px}
    .t-flow .name{color:var(--link);font-weight:600;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .t-flow .arrow{color:var(--hint)}
    .t-meta{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--hint)}
    .t-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase}
    .tag-transfer{background:rgba(66,165,245,.12);color:#42a5f5}
    .tag-tracked{background:rgba(240,192,64,.12);color:var(--gold)}
    .tag-match{background:rgba(76,175,80,.15);color:var(--green)}

    .status-box{border-radius:10px;padding:10px 12px;margin:8px 0;font-size:11px;font-weight:600}
    .status-ok{background:rgba(76,175,80,.1);color:var(--green)}
    .status-err{background:rgba(244,67,54,.1);color:var(--red)}
    .toast{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:var(--btn);color:var(--btn-text);padding:9px 20px;border-radius:20px;font-size:12px;font-weight:700;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:top .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:92%}.toast.show{top:14px}.toast.err{background:var(--red)}
    .empty{text-align:center;padding:30px 20px;color:var(--hint);font-size:13px}
    .log{background:var(--sec-bg);border-radius:10px;padding:10px;margin:10px 0;font-size:9px;color:var(--hint);font-family:monospace;max-height:150px;overflow-y:auto;word-break:break-all;white-space:pre-wrap;display:none}
    .log.open{display:block}
    .log .ok{color:var(--green)}.log .err{color:var(--red)}.log .warn{color:var(--gold)}
    .log-toggle{font-size:11px;color:var(--hint);cursor:pointer;text-decoration:underline}
    .c0{background:#e91e63}.c1{background:#1e88e5}.c2{background:#43a047}.c3{background:#fb8c00}.c4{background:#8e24aa}.c5{background:#00acc1}.c6{background:#e53935}.c7{background:#3949ab}
    .counter{font-size:11px;color:var(--hint);margin-left:6px}
  </style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="page">
  <div class="hdr">
    <h1>🎁 Gift Tracker</h1>
    <div class="pill"><div class="dot"></div>v19</div>
  </div>
  <div id="authBox" class="status-box status-err">⏳ Подключение...</div>

  <div class="lbl">Отслеживаемые аккаунты</div>
  <div class="row">
    <input class="inp" id="inpUser" placeholder="@username (из see.tg)" autocomplete="off" spellcheck="false">
    <button class="btn-add" onclick="addAcc()">+</button>
  </div>
  <div style="font-size:10px;color:var(--hint);margin-bottom:8px">Юзернейм должен быть в базе see.tg. Можно добавить вручную.</div>
  <div class="acc-grid" id="accList"></div>

  <div class="lbl">Отслеживаемые подарки<span class="counter" id="giftCount"></span></div>
  <div id="giftIdList"></div>

  <div class="lbl">Передачи<span class="counter" id="feedCount"></span></div>
  <div id="feedList"></div>

  <div style="margin-top:20px">
    <span class="log-toggle" onclick="document.getElementById('logBox').classList.toggle('open')">🔧 Показать/скрыть лог</span>
    <div class="log" id="logBox"></div>
  </div>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();try{tg.setHeaderColor('secondary_bg_color')}catch(e){}}

const PROXY='/api/proxy';

const GIFT_IDS=[
  '5782984811920491178','6028426950047957932','5983484377902875708',
  '5980789805615678057','5913442287462908725','5915502858152706668',
  '5825801628657124140','5170594532177215681','5783075783622787539'
];

// State
let accs=JSON.parse(localStorage.getItem('gt19_accs')||'[]');
function saveAccs(){localStorage.setItem('gt19_accs',JSON.stringify(accs))}

// Log
const logEl=document.getElementById('logBox');
function log(m,c){const d=document.createElement('div');if(c)d.className=c;d.textContent=new Date().toLocaleTimeString()+': '+m;logEl.appendChild(d);logEl.scrollTop=1e6}

function toast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='toast'+(e?' err':'')+' show';setTimeout(()=>t.classList.remove('show'),3500)}

// API
async function api(path,params={}){
  const u=new URLSearchParams({path,...params});
  log('GET '+path+' '+JSON.stringify(params));
  const r=await fetch(PROXY+'?'+u);
  const txt=await r.text();
  let data;try{data=JSON.parse(txt)}catch(e){data=txt}
  if(!r.ok){log('❌ '+r.status+': '+JSON.stringify(data).slice(0,200),'err');throw new Error(JSON.stringify(data).slice(0,100))}
  log('✅ '+r.status,'ok');
  return data;
}

// Auth test
async function testAuth(){
  const box=document.getElementById('authBox');
  try{
    await api('history',{limit:'1'});
    box.className='status-box status-ok';box.textContent='✅ API подключён';
    return true;
  }catch(e){
    box.className='status-box status-err';box.textContent='❌ '+e.message;
    return false;
  }
}

// Add account — save locally, optionally verify
async function addAcc(){
  const inp=document.getElementById('inpUser');
  let u=inp.value.trim().replace(/^@/,'');
  if(!u||u.length<2){toast('Введите username',true);return}
  if(accs.find(a=>a.username.toLowerCase()===u.toLowerCase())){toast('Уже есть',true);return}
  
  // Just add locally — no need to verify through API
  accs.push({username:u});
  inp.value='';saveAccs();renderAccs();
  toast('✅ @'+u+' добавлен');
}
document.getElementById('inpUser').addEventListener('keydown',e=>{if(e.key==='Enter')addAcc()});
function removeAcc(u){accs=accs.filter(a=>a.username!==u);saveAccs();renderAccs()}

// Load history
async function loadHistory(){
  try{
    const data=await api('history',{limit:'10'});
    // Response: {history: [...]}
    const items=data.history||data.items||data.data||(Array.isArray(data)?data:[]);
    log('History: '+items.length+' items');
    return items;
  }catch(e){return []}
}

// Format time
function fT(d){
  if(!d)return'';
  const dt=new Date(d);
  const m=Math.floor((Date.now()-dt)/6e4);
  if(m<1)return'сейчас';if(m<60)return m+' мин';
  if(m<1440)return Math.floor(m/60)+' ч';
  return dt.toLocaleDateString('ru-RU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

// Render
function renderAccs(){
  const el=document.getElementById('accList');
  if(!accs.length){el.innerHTML='<div style="color:var(--hint);font-size:12px">Добавьте аккаунты для отслеживания</div>';return}
  el.innerHTML=accs.map((a,i)=>
    '<div class="acc-chip"><div class="dot c'+(i%8)+'"></div>@'+a.username+
    '<span class="rm" onclick="removeAcc(\''+a.username+'\')">×</span></div>'
  ).join('');
}

function renderGiftIds(){
  document.getElementById('giftCount').textContent='· '+GIFT_IDS.length;
  document.getElementById('giftIdList').innerHTML=GIFT_IDS.map(id=>
    '<div class="chip">🎁 '+id.slice(-8)+'</div>'
  ).join('');
}

function renderFeed(items){
  const el=document.getElementById('feedList');
  if(!items||!items.length){el.innerHTML='<div class="empty">Загрузка...</div>';return}
  
  const accUsernames=accs.map(a=>a.username.toLowerCase());
  
  let matchCount=0;
  
  const html=items.map(item=>{
    // Parse nested objects
    const gift=item.gift||{};
    const owner=item.owner||{};
    const prev=item.prev_owner||{};
    
    const giftTitle=gift.title||'Gift';
    const giftNum=gift.num?'#'+gift.num:'';
    const giftId=String(gift.gift_id||gift.id||'');
    const giftUrl=gift.url||'';
    const modelName=gift.model_name||'';
    
    const ownerName=owner.name||owner.username||'?';
    const ownerUser=owner.username||'';
    const prevName=prev.name||prev.username||'?';
    const prevUser=prev.username||'';
    
    const time=item.seen_at||'';
    const action=item.action||'transfer';
    
    // Check if this gift ID is in our tracked list
    const isTrackedGift=GIFT_IDS.includes(giftId);
    
    // Check if owner or prev_owner is in our tracked accounts
    const ownerTracked=accUsernames.includes(ownerUser.toLowerCase());
    const prevTracked=accUsernames.includes(prevUser.toLowerCase());
    const isAccountMatch=ownerTracked||prevTracked;
    
    // Both gift AND account match = highlight!
    const isFullMatch=isTrackedGift&&isAccountMatch;
    if(isFullMatch)matchCount++;
    
    const cardClass=isFullMatch?'matched':isTrackedGift?'tracked':'';
    
    return '<div class="t-card '+cardClass+'"'+
      (giftUrl?' onclick="window.open(\''+giftUrl+'\',\'_blank\')"style="cursor:pointer"':'')+'>'+
      '<div class="t-top">'+
        '<div class="t-icon">🎁</div>'+
        '<div class="t-info">'+
          '<div class="t-title">'+giftTitle+' '+giftNum+'</div>'+
          (modelName?'<div class="t-num">'+modelName+'</div>':'')+
        '</div>'+
        (isFullMatch?'<span class="t-tag tag-match">⭐ MATCH</span>':
         isTrackedGift?'<span class="t-tag tag-tracked">🎯 Tracked</span>':'')+
      '</div>'+
      '<div class="t-flow">'+
        '<span class="name">'+(prevUser?'@'+prevUser:prevName)+'</span>'+
        '<span class="arrow">→</span>'+
        '<span class="name"'+(ownerTracked?' style="color:var(--green)"':'')+'>'+(ownerUser?'@'+ownerUser:ownerName)+'</span>'+
      '</div>'+
      '<div class="t-meta">'+
        '<span>'+fT(time)+'</span>'+
        '<span class="t-tag tag-transfer">'+action+'</span>'+
      '</div>'+
    '</div>';
  }).join('');
  
  document.getElementById('feedCount').textContent='· '+items.length+(matchCount?' (⭐'+matchCount+' совпадений)':'');
  el.innerHTML=html;
}

// Init
renderAccs();renderGiftIds();
log('=== Gift Tracker v19 ===');

(async()=>{
  const ok=await testAuth();
  if(ok){
    const items=await loadHistory();
    renderFeed(items);
  }
  // Poll every 30s
  setInterval(async()=>{
    try{
      const items=await loadHistory();
      if(items&&items.length)renderFeed(items);
    }catch(e){}
  },30000);
})();
</script>
</body>
</html>
