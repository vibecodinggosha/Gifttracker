<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gift Tracker</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--bg:var(--tg-theme-bg-color,#0f0f1a);--text:var(--tg-theme-text-color,#e8e8f0);--hint:var(--tg-theme-hint-color,#6b6b80);--link:var(--tg-theme-link-color,#5eabf7);--btn:var(--tg-theme-button-color,#5eabf7);--btn-text:var(--tg-theme-button-text-color,#fff);--sec-bg:var(--tg-theme-secondary-bg-color,#1a1a2e);--gold:#f0c040;--green:#4caf50;--red:#f44336}
    body{font-family:'Nunito',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    .page{padding:12px 16px 40px}
    .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-top:4px}
    .hdr h1{font-size:20px;font-weight:800}
    .pill{background:rgba(76,175,80,.12);color:var(--green);padding:4px 10px;border-radius:16px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:4px}
    .pill .dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:bl 1.8s ease-in-out infinite}
    @keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
    .row{display:flex;gap:8px;margin-bottom:14px}
    .inp{flex:1;background:var(--sec-bg);border:2px solid transparent;border-radius:12px;padding:11px 14px;font-size:14px;font-family:inherit;font-weight:600;color:var(--text);outline:none}.inp::placeholder{color:var(--hint)}.inp:focus{border-color:var(--btn)}
    .btn-add{background:var(--btn);color:var(--btn-text);border:none;border-radius:12px;width:46px;font-size:22px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .lbl{font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 8px}
    .card{background:var(--sec-bg);border-radius:12px;padding:12px;margin-bottom:8px;font-size:13px}
    .card .title{font-weight:700;margin-bottom:4px}
    .card .sub{font-size:11px;color:var(--hint)}
    .card .hl{color:var(--link);font-weight:600}
    .chip{display:inline-block;background:var(--sec-bg);border-radius:8px;padding:6px 10px;margin:3px;font-size:11px;font-weight:600;color:var(--hint)}
    .chip .x{color:var(--red);cursor:pointer;margin-left:4px;font-weight:800}
    .acc-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
    .acc-chip{background:var(--sec-bg);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
    .acc-chip .dot{width:8px;height:8px;border-radius:50%}
    .acc-chip .rm{color:var(--red);cursor:pointer;margin-left:4px;font-size:14px;font-weight:800}
    .log{background:var(--sec-bg);border-radius:10px;padding:10px;margin:10px 0;font-size:10px;color:var(--hint);font-family:monospace;max-height:300px;overflow-y:auto;word-break:break-all;white-space:pre-wrap}
    .log .ok{color:var(--green)}.log .err{color:var(--red)}.log .warn{color:var(--gold)}
    .toast{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:var(--btn);color:var(--btn-text);padding:9px 20px;border-radius:20px;font-size:12px;font-weight:700;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:top .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:92%}.toast.show{top:14px}.toast.err{background:var(--red)}
    .empty{text-align:center;padding:40px 20px;color:var(--hint);font-size:13px}
    .c0{background:#e91e63}.c1{background:#1e88e5}.c2{background:#43a047}.c3{background:#fb8c00}.c4{background:#8e24aa}.c5{background:#00acc1}.c6{background:#e53935}.c7{background:#3949ab}
    .status-box{border-radius:10px;padding:10px 12px;margin:8px 0;font-size:11px;font-weight:600}
    .status-ok{background:rgba(76,175,80,.1);color:var(--green)}
    .status-err{background:rgba(244,67,54,.1);color:var(--red)}
  </style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="page">
  <div class="hdr">
    <h1>🎁 Gift Tracker</h1>
    <div class="pill"><div class="dot"></div>v11</div>
  </div>

  <!-- AUTH STATUS -->
  <div id="authBox" class="status-box status-err">⏳ Проверка авторизации...</div>

  <!-- ADD ACCOUNT -->
  <div class="lbl">Отслеживаемые аккаунты</div>
  <div class="row">
    <input class="inp" id="inpUser" placeholder="@username" autocomplete="off" spellcheck="false">
    <button class="btn-add" onclick="addAcc()">+</button>
  </div>
  <div class="acc-grid" id="accList"></div>

  <!-- TRACKED GIFT IDS -->
  <div class="lbl">Отслеживаемые подарки (ID)</div>
  <div id="giftIdList"></div>

  <!-- TRANSFERS -->
  <div class="lbl" id="feedLabel">Обнаруженные передачи</div>
  <div id="feedList"></div>

  <!-- DEBUG LOG -->
  <div class="lbl">🔧 API лог (для отладки)</div>
  <div class="log" id="logBox"></div>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();try{tg.setHeaderColor('secondary_bg_color')}catch(e){}}

// ===== CONFIG =====
const API='https://poso.see.tg/api';
const APP_TOKEN='d7ec7fc9-2e5e-4537-a787-dd63c7ff8e6a:1e61f04b645e1d4e94895fafd54cbf367fde0ef59f52c829a28c402ea0cb6e0e';
const TG_INIT=tg?.initData||'';

// Gift IDs to track
const GIFT_IDS=[
  '5782984811920491178',
  '6028426950047957932',
  '5983484377902875708',
  '5980789805615678057',
  '5913442287462908725',
  '5915502858152706668',
  '5825801628657124140',
  '5170594532177215681',
  '5783075783622787539'
];

// ===== STATE =====
let accs=JSON.parse(localStorage.getItem('gt10_accs')||'[]');
let transfers=[];
let authOK=false;

function saveAccs(){localStorage.setItem('gt10_accs',JSON.stringify(accs))}

// ===== LOGGING =====
const logEl=document.getElementById('logBox');
function log(msg,cls){
  const t=new Date().toLocaleTimeString();
  const line=document.createElement('div');
  if(cls)line.className=cls;
  line.textContent=t+': '+msg;
  logEl.appendChild(line);
  logEl.scrollTop=logEl.scrollHeight;
}

// ===== TOAST =====
function toast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='toast'+(e?' err':'')+' show';setTimeout(()=>t.classList.remove('show'),3500)}

// ===== API =====
log('initData: '+(TG_INIT?'YES ('+TG_INIT.length+' chars)':'NO — не в Telegram'));

async function api(method,path,body){
  const u=new URL(API+path);
  const opts={method,headers:{Accept:'application/json'}};
  
  // Auth: send initData in Authorization header
  if(TG_INIT){
    opts.headers['Authorization']='tma '+TG_INIT;
  }
  
  if(body){
    opts.headers['Content-Type']='application/json';
    opts.body=JSON.stringify(body);
  }
  
  log(method+' '+path,'');
  
  try{
    const r=await fetch(u.toString(),opts);
    const txt=await r.text();
    
    if(!r.ok){
      log('❌ '+r.status+': '+txt.slice(0,300),'err');
      throw new Error(r.status+': '+txt.slice(0,100));
    }
    
    let data;
    try{data=JSON.parse(txt)}catch(e){data=txt}
    
    // LOG FULL RESPONSE — this is critical for debugging
    log('✅ '+r.status+': '+JSON.stringify(data).slice(0,500),'ok');
    return data;
    
  }catch(e){
    if(e.name==='TypeError')log('🔴 Network/CORS: '+e.message,'err');
    else if(!e.message.startsWith('4'))log('🔴 '+e.message,'err');
    throw e;
  }
}

// ===== AUTH TEST =====
async function testAuth(){
  const box=document.getElementById('authBox');
  
  if(!TG_INIT){
    box.className='status-box status-err';
    box.textContent='❌ initData отсутствует — откройте через Telegram бота';
    log('No initData — not in Telegram?','err');
    return false;
  }
  
  // Test with /api/history which we know works
  try{
    log('Testing auth with /api/history...');
    const data=await api('GET','/history?limit=1');
    box.className='status-box status-ok';
    box.textContent='✅ API работает! Авторизация OK';
    authOK=true;
    return true;
  }catch(e){
    if(e.message.includes('400')){
      // 400 means auth passed but bad params — still OK!
      box.className='status-box status-ok';
      box.textContent='✅ Авторизация работает!';
      authOK=true;
      return true;
    }
    box.className='status-box status-err';
    box.textContent='❌ Auth ошибка: '+e.message;
    return false;
  }
}

// ===== LOAD GIFT INFO =====
async function loadGiftInfo(giftId){
  try{
    return await api('GET','/gift?id='+giftId);
  }catch(e){
    log('Gift '+giftId+' fetch failed: '+e.message,'warn');
    return null;
  }
}

// ===== LOAD HISTORY =====
async function loadHistory(){
  log('--- Loading history ---');
  
  try{
    const data=await api('GET','/history?limit=10');
    
    if(data){
      const items=Array.isArray(data)?data:(data.items||data.data||data.results||data.history||[]);
      log('History returned '+items.length+' items','ok');
      
      if(items.length>0){
        log('FIRST ITEM FULL: '+JSON.stringify(items[0]),'warn');
        log('FIRST ITEM KEYS: '+Object.keys(items[0]).join(', '),'warn');
        if(items.length>1){
          log('SECOND ITEM: '+JSON.stringify(items[1]),'warn');
        }
      }
      
      return items;
    }
  }catch(e){
    log('History failed: '+e.message,'err');
  }
  
  return [];
}

// ===== ADD ACCOUNT =====
async function addAcc(){
  const inp=document.getElementById('inpUser');
  let u=inp.value.trim().replace(/^@/,'');
  if(!u||u.length<2){toast('Введите @username',true);return}
  if(accs.find(a=>a.username.toLowerCase()===u.toLowerCase())){toast('Уже есть',true);return}
  
  try{
    log('Fetching owner: '+u);
    const data=await api('GET','/owner?username='+u);
    log('Owner response keys: '+Object.keys(data).join(', '),'warn');
    log('Owner FULL: '+JSON.stringify(data).slice(0,500),'warn');
    
    const acc={
      id:data.id||data.owner_id||data.user_id||u,
      username:data.username||u,
      name:data.name||data.first_name||data.display_name||u
    };
    accs.push(acc);inp.value='';saveAccs();renderAccs();
    toast('✅ @'+acc.username+' добавлен');
  }catch(e){
    toast('Ошибка: '+e.message,true);
  }
}

document.getElementById('inpUser').addEventListener('keydown',e=>{if(e.key==='Enter')addAcc()});

function removeAcc(u){
  accs=accs.filter(a=>a.username!==u);
  saveAccs();renderAccs();
}

// ===== RENDER =====
function renderAccs(){
  const el=document.getElementById('accList');
  if(!accs.length){el.innerHTML='<div style="color:var(--hint);font-size:12px">Пока нет аккаунтов</div>';return}
  el.innerHTML=accs.map((a,i)=>
    '<div class="acc-chip"><div class="dot c'+(i%8)+'"></div>@'+a.username+
    '<span class="rm" onclick="removeAcc(\''+a.username+'\')">×</span></div>'
  ).join('');
}

function renderGiftIds(){
  document.getElementById('giftIdList').innerHTML=GIFT_IDS.map(id=>
    '<div class="chip">🎁 '+id.slice(0,8)+'...'+id.slice(-4)+'</div>'
  ).join('');
}

function renderFeed(items){
  const el=document.getElementById('feedList');
  if(!items||!items.length){
    el.innerHTML='<div class="empty">Нет данных. Проверьте лог ниже.</div>';
    return;
  }
  
  el.innerHTML=items.map(item=>{
    // Try to extract data from whatever format the API returns
    const keys=Object.keys(item);
    const name=item.gift_name||item.name||item.title||item.gift_title||'Unknown';
    const from=item.prev_owner||item.prev_owner_username||item.from||item.from_username||item.sender||'?';
    const to=item.owner||item.owner_username||item.to||item.to_username||item.new_owner||item.recipient||'?';
    const time=item.seen_at||item.date||item.created_at||item.timestamp||'';
    const gid=item.gift_id||item.id||'';
    
    return '<div class="card">'+
      '<div class="title">🎁 '+name+'</div>'+
      '<div class="sub">от <span class="hl">'+from+'</span> → <span class="hl">'+to+'</span></div>'+
      (time?'<div class="sub">'+new Date(time).toLocaleString('ru-RU')+'</div>':'')+
      (gid?'<div class="sub" style="font-size:10px">ID: '+gid+'</div>':'')+
      '<div class="sub" style="font-size:9px;color:var(--hint);margin-top:4px">keys: '+keys.join(', ')+'</div>'+
    '</div>';
  }).join('');
}

// ===== INIT =====
renderAccs();
renderGiftIds();

log('=== Gift Tracker v11 ===');
log('Tracked gifts: '+GIFT_IDS.length);
log('Tracked accounts: '+accs.length);
log('initData: '+(TG_INIT?TG_INIT.slice(0,60)+'...':'NONE'));

(async()=>{
  // 1. Test auth
  const ok=await testAuth();
  
  if(!ok){
    log('Auth failed. Trying to load what we can...','warn');
  }
  
  // 2. Load history (this is the main data source)
  log('--- Loading history data ---');
  const items=await loadHistory();
  renderFeed(items);
  
  // 3. Poll every 30s
  setInterval(async()=>{
    try{
      const items=await loadHistory();
      if(items.length)renderFeed(items);
    }catch(e){}
  },30000);
})();
</script>
</body>
</html>
