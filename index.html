<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gift Tracker</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--bg:var(--tg-theme-bg-color,#0f0f1a);--text:var(--tg-theme-text-color,#e8e8f0);--hint:var(--tg-theme-hint-color,#6b6b80);--link:var(--tg-theme-link-color,#5eabf7);--btn:var(--tg-theme-button-color,#5eabf7);--btn-text:var(--tg-theme-button-text-color,#fff);--sec-bg:var(--tg-theme-secondary-bg-color,#1a1a2e);--gold:#f0c040;--green:#4caf50;--red:#f44336}
    body{font-family:'Nunito',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    .nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--sec-bg);border-top:1px solid rgba(255,255,255,.06);display:flex;padding:6px 0 env(safe-area-inset-bottom,6px)}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--hint);font-size:10px;font-weight:700;font-family:inherit;padding:6px 0;cursor:pointer;position:relative}.nav-btn.active{color:var(--btn)}.nav-btn svg{width:22px;height:22px;fill:currentColor}
    .nav-badge{position:absolute;top:2px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 4px}
    .page{display:none;padding:12px 16px 80px}.page.active{display:block}
    .page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-top:4px}.page-hdr h1{font-size:22px;font-weight:800;letter-spacing:-.4px}
    .status-pill{background:rgba(76,175,80,.12);color:var(--green);padding:4px 10px;border-radius:16px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:4px}.status-pill .dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.8s ease-in-out infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .search-row{display:flex;gap:8px;margin-bottom:18px}.search-input{flex:1;background:var(--sec-bg);border:2px solid transparent;border-radius:12px;padding:12px 14px;font-size:14px;font-family:inherit;font-weight:600;color:var(--text);outline:none;transition:border-color .2s}.search-input::placeholder{color:var(--hint)}.search-input:focus{border-color:var(--btn)}
    .search-add{background:var(--btn);color:var(--btn-text);border:none;border-radius:12px;width:46px;font-size:24px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center}.search-add:active{transform:scale(.9)}
    .section-label{font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
    .accounts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:10px;margin-bottom:20px}
    .acc-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;animation:popIn .3s ease-out both}@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
    .acc-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;position:relative;overflow:hidden}.acc-avatar img{width:100%;height:100%;object-fit:cover}
    .bell-ind{position:absolute;bottom:-1px;right:-1px;width:20px;height:20px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px}
    .acc-name{font-size:10px;font-weight:700;color:var(--hint);max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
    .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:150;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;padding:0 16px 40px}.overlay.open{transform:translateX(0)}
    .det-hdr{display:flex;align-items:center;gap:12px;padding:16px 0;position:sticky;top:0;background:var(--bg);z-index:10}
    .back-btn{width:36px;height:36px;border-radius:10px;background:var(--sec-bg);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer}.back-btn svg{width:20px;height:20px;fill:var(--text)}
    .det-user{flex:1;min-width:0}.det-user .nm{font-size:16px;font-weight:800}.det-user .sb{font-size:12px;color:var(--hint)}.det-user .pv{font-size:11px;color:var(--gold);font-weight:700;margin-top:2px}
    .det-acts{display:flex;gap:8px}.act-btn{width:38px;height:38px;border-radius:10px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer}.act-btn svg{width:20px;height:20px}.act-btn.bell{background:rgba(240,192,64,.12)}.act-btn.bell.on svg{fill:var(--gold)}.act-btn.bell.off svg{fill:var(--hint)}.act-btn.del{background:rgba(244,67,54,.1)}.act-btn.del svg{fill:var(--red)}.act-btn:active{transform:scale(.88)}
    .g-card{background:var(--sec-bg);border-radius:14px;padding:12px 14px;margin-bottom:8px;animation:sUp .3s ease-out both}@keyframes sUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .g-top{display:flex;align-items:center;gap:10px}.g-ico{width:42px;height:42px;border-radius:11px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:20px}.g-ico img{width:100%;height:100%;object-fit:cover}
    .g-inf{flex:1;min-width:0}.g-ttl{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.g-col{font-size:11px;color:var(--hint)}.g-frm{font-size:11px;color:var(--link);font-weight:600}
    .g-bot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.04)}.g-time{font-size:10px;color:var(--hint);font-weight:600}
    .g-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(66,165,245,.15);color:#42a5f5}
    .day-lbl{font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.7px;padding:12px 2px 6px}
    .f-card{background:var(--sec-bg);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;animation:sUp .3s ease-out both;cursor:pointer}
    .f-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}.f-av img{width:100%;height:100%;object-fit:cover}
    .f-body{flex:1;min-width:0}.f-l1{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.f-l1 .hl{color:var(--link)}.f-l2{font-size:11px;color:var(--hint);margin-top:1px}
    .f-time{font-size:10px;color:var(--hint);font-weight:600;flex-shrink:0}
    .empty{text-align:center;padding:50px 20px}.empty .ico{font-size:48px;margin-bottom:12px;animation:fl 3s ease-in-out infinite}@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}.empty h3{font-size:16px;font-weight:800;margin-bottom:5px}.empty p{font-size:12px;color:var(--hint);line-height:1.5}
    .toast{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:var(--btn);color:var(--btn-text);padding:9px 20px;border-radius:20px;font-size:12px;font-weight:700;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:top .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:92%;overflow:hidden;text-overflow:ellipsis}.toast.show{top:14px}.toast.err{background:var(--red)}
    .spinner{width:24px;height:24px;border:3px solid var(--sec-bg);border-top-color:var(--btn);border-radius:50%;animation:sp .7s linear infinite;margin:30px auto}@keyframes sp{to{transform:rotate(360deg)}}.ld-txt{text-align:center;color:var(--hint);font-size:12px;margin-top:8px}
    .c0{background:linear-gradient(135deg,#f06292,#e91e63)}.c1{background:linear-gradient(135deg,#42a5f5,#1e88e5)}.c2{background:linear-gradient(135deg,#66bb6a,#43a047)}.c3{background:linear-gradient(135deg,#ffa726,#fb8c00)}.c4{background:linear-gradient(135deg,#ab47bc,#8e24aa)}.c5{background:linear-gradient(135deg,#26c6da,#00acc1)}.c6{background:linear-gradient(135deg,#ef5350,#e53935)}.c7{background:linear-gradient(135deg,#5c6bc0,#3949ab)}
    .err-box{background:rgba(244,67,54,.1);border:1px solid rgba(244,67,54,.3);border-radius:12px;padding:12px 14px;margin:10px 0;font-size:12px;color:#ff8a80;word-break:break-all}
    .err-box b{color:var(--red)}
    .debug-log{background:var(--sec-bg);border-radius:10px;padding:10px;margin:10px 0;font-size:10px;color:var(--hint);font-family:monospace;max-height:200px;overflow-y:auto;word-break:break-all}
  </style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="page active" id="pageAccounts">
  <div class="page-hdr"><h1>👁 Трекинг</h1><div class="status-pill"><div class="dot"></div>Live</div></div>
  <div class="search-row">
    <input class="search-input" id="inputUser" type="text" placeholder="Введите @username" autocomplete="off" spellcheck="false">
    <button class="search-add" id="addBtn" onclick="addAccount()">+</button>
  </div>
  <div id="accSection"></div>
  <div id="debugArea"></div>
</div>

<div class="page" id="pageFeed">
  <div class="page-hdr"><h1>🎁 Лента</h1></div>
  <div id="feedSection"></div>
</div>

<div class="overlay" id="detOverlay">
  <div class="det-hdr">
    <button class="back-btn" onclick="closeDet()"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
    <div class="det-user"><div class="nm" id="dName"></div><div class="sb" id="dSub"></div><div class="pv" id="dPV"></div></div>
    <div class="det-acts">
      <button class="act-btn bell" id="dBell" onclick="toggleBellDet()"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></button>
      <button class="act-btn del" onclick="remDet()"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
    </div>
  </div>
  <div id="dGifts"></div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="switchPage('pageAccounts',this)"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>Аккаунты</button>
  <button class="nav-btn" onclick="switchPage('pageFeed',this)"><svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.11-.31.18-.65.18-1 0-1.66-1.34-3-3-3-1.05 0-1.96.54-2.5 1.35l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-5-2c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM9 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm11 15H4v-2h16v2zm0-5H4V8h5.08L7 10.83 8.62 12 11 8.76l1-1.36 1 1.36L15.38 12 17 10.83 14.92 8H20v6z"/></svg><span class="nav-badge" id="fBadge"></span>Лента</button>
</nav>

<script>
const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand();try{tg.setHeaderColor('secondary_bg_color')}catch(e){}}

// ===== CLEAR OLD MOCK DATA =====
const APP_VERSION = 'v4';
if(localStorage.getItem('gt_version') !== APP_VERSION){
  localStorage.clear();
  localStorage.setItem('gt_version', APP_VERSION);
}

const API='https://poso.see.tg/api';
const TK='0764508f-b974-45e3-8a84-ee107c7d7515:4845372cb2a9faefcd8caf7ad908a11fee56d70c191bb5fe6299f82d7575a242';

let debugLog = [];
function log(msg){
  debugLog.push(new Date().toLocaleTimeString()+': '+msg);
  if(debugLog.length>20)debugLog.shift();
  const el=document.getElementById('debugArea');
  if(el)el.innerHTML='<div class="debug-log">'+debugLog.join('<br>')+'</div>';
}

async function aGet(p,q={}){
  const u=new URL(API+p);
  Object.entries(q).forEach(([k,v])=>{if(v!=null)u.searchParams.set(k,v)});
  log('GET '+u.pathname+u.search);
  try{
    const r=await fetch(u.toString(),{headers:{Authorization:'Bearer '+TK,Accept:'application/json'}});
    log('Response: '+r.status+' '+r.statusText);
    if(!r.ok){const txt=await r.text();log('Error body: '+txt.slice(0,200));throw new Error(r.status+': '+txt.slice(0,100))}
    const data=await r.json();
    log('OK: '+JSON.stringify(data).slice(0,150));
    return data;
  }catch(e){
    if(e.name==='TypeError'){log('CORS/Network error: '+e.message)}
    else{log('Error: '+e.message)}
    throw e;
  }
}

async function aPost(p,b={}){
  log('POST '+p+' body: '+JSON.stringify(b));
  try{
    const r=await fetch(API+p,{method:'POST',headers:{Authorization:'Bearer '+TK,'Content-Type':'application/json'},body:JSON.stringify(b)});
    log('Response: '+r.status);
    if(!r.ok){const txt=await r.text();log('Error: '+txt.slice(0,200));throw new Error(r.status)}
    return r.json();
  }catch(e){
    if(e.name==='TypeError')log('CORS/Network error: '+e.message);
    throw e;
  }
}

function avUrl(u){return API+'/avatar/'+encodeURIComponent(u.replace(/^@/,''))}

let accs=[],hist=[],curDet=null,unseen=0;
function ld(){try{const a=localStorage.getItem('gt_accs');if(a)accs=JSON.parse(a)}catch(e){}}
function sv(){try{localStorage.setItem('gt_accs',JSON.stringify(accs))}catch(e){}}
ld();

function toast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='toast'+(e?' err':'')+' show';setTimeout(()=>t.classList.remove('show'),3e3)}
function hap(t){try{tg?.HapticFeedback?.[t==='n'?'notificationOccurred':'impactOccurred'](t==='n'?'success':'light')}catch(e){}}
function cc(u){return'c'+((u||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0)%8)}
function fT(d){if(typeof d==='string')d=new Date(d);const m=Math.floor((Date.now()-d)/6e4);if(m<1)return'сейчас';if(m<60)return m+'м';if(m<1440)return(m/60|0)+'ч';return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}
function dL(d){if(typeof d==='string')d=new Date(d);const t=new Date();if(d.toDateString()===t.toDateString())return'Сегодня';const y=new Date(t);y.setDate(y.getDate()-1);if(d.toDateString()===y.toDateString())return'Вчера';return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}

function switchPage(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(id==='pageFeed'){unseen=0;updBadge();renderFeed()}}
function updBadge(){const b=document.getElementById('fBadge');if(unseen>0){b.textContent=unseen;b.style.display='flex'}else b.style.display='none'}

async function addAccount(){
  const inp=document.getElementById('inputUser');
  let u=inp.value.trim().replace(/^@/,'');
  if(!u||u.length<2){toast('Введите @username',true);return}
  if(accs.find(a=>a.username.toLowerCase()===u.toLowerCase())){toast('Уже отслеживается',true);return}
  
  const btn=document.getElementById('addBtn');btn.textContent='⏳';btn.disabled=true;
  
  try{
    const d=await aGet('/owner',{username:u});
    log('Owner data: '+JSON.stringify(d).slice(0,300));
    
    const acc={
      id: d.id || d.owner_id || u,
      username: d.username || u,
      name: d.name || d.first_name || d.username || u,
      bellOn: true,
      pv: d.portfolio_value || d.value || null
    };
    
    accs.push(acc);inp.value='';sv();renderAccs();
    toast('🔔 @'+acc.username+' добавлен');hap('n');
    
    try{await aPost('/follow',{owner_id:String(acc.id)})}catch(e){log('Follow failed: '+e.message)}
    
    await loadHist(acc.id);
    
  }catch(e){
    log('Add failed: '+e.message);
    if(e.name==='TypeError'){
      toast('CORS ошибка — нужен прокси',true);
      document.getElementById('debugArea').innerHTML+=
        '<div class="err-box"><b>CORS Error:</b> Браузер блокирует запросы к see.tg API. Нужен серверный прокси (Vercel/Cloudflare Workers).</div>';
    }else if(e.message.includes('404')){
      toast('Пользователь не найден',true);
    }else{
      toast('Ошибка: '+e.message,true);
    }
  }finally{btn.textContent='+';btn.disabled=false}
}
document.getElementById('inputUser').addEventListener('keydown',e=>{if(e.key==='Enter')addAccount()});

async function loadHist(oid){
  try{
    const d=await aGet('/history',{owner_id:String(oid),limit:'10',order:'desc'});
    log('History raw: '+JSON.stringify(d).slice(0,300));
    const items=Array.isArray(d)?d:(d.items||d.data||d.results||[]);
    const nw=items.filter(h=>!hist.find(x=>(x.id||x._id)===(h.id||h._id)));
    hist=nw.concat(hist);
    hist.sort((a,b)=>new Date(b.seen_at||b.date||0)-new Date(a.seen_at||a.date||0));
  }catch(e){log('History err: '+e.message)}
}

function toggleBell(u){const a=accs.find(a=>a.username===u);if(a){a.bellOn=!a.bellOn;sv();renderAccs();hap('i')}}
async function removeAcc(u){const a=accs.find(x=>x.username===u);accs=accs.filter(x=>x.username!==u);sv();renderAccs();toast('Удалён @'+u);hap('i')}

function renderAccs(){
  const el=document.getElementById('accSection');
  if(!accs.length){el.innerHTML='<div class="empty"><div class="ico">👀</div><h3>Нет отслеживаемых</h3><p>Добавьте @username чтобы<br>следить за NFT-подарками</p></div>';return}
  let h='<div class="section-label">Отслеживаемые аккаунты · '+accs.length+'</div><div class="accounts-grid">';
  accs.forEach((a,i)=>{
    const letter=(a.name||a.username||'?')[0].toUpperCase();
    h+='<div class="acc-item" style="animation-delay:'+i*.04+'s" onclick="openDet(\''+a.username+'\')">'
      +'<div style="position:relative">'
      +'<div class="acc-avatar '+cc(a.username)+'">'
      +'<img src="'+avUrl(a.username)+'" onerror="this.style.display=\'none\'">'
      +'<span style="position:absolute;font-size:20px;font-weight:800">'+letter+'</span>'
      +'</div>'
      +'<div class="bell-ind" style="color:'+(a.bellOn?'var(--gold)':'var(--hint)')+'">'+(a.bellOn?'🔔':'🔕')+'</div>'
      +'</div>'
      +'<div class="acc-name">@'+a.username+'</div></div>';
  });
  el.innerHTML=h+'</div>';
}

async function openDet(u){
  curDet=u;const a=accs.find(x=>x.username===u);if(!a)return;
  document.getElementById('dName').textContent='@'+a.username;
  document.getElementById('dSub').textContent=a.bellOn?'🔔 Уведомления вкл':'🔕 Уведомления выкл';
  document.getElementById('dPV').textContent=a.pv?'💰 '+a.pv+' TON':'';
  document.getElementById('dBell').className='act-btn bell '+(a.bellOn?'on':'off');
  document.getElementById('detOverlay').classList.add('open');
  document.getElementById('dGifts').innerHTML='<div class="spinner"></div><div class="ld-txt">Загрузка истории...</div>';
  await loadHist(a.id);
  renderDetGifts(u);
}
function closeDet(){curDet=null;document.getElementById('detOverlay').classList.remove('open')}
function toggleBellDet(){if(!curDet)return;toggleBell(curDet);const a=accs.find(x=>x.username===curDet);if(a){document.getElementById('dSub').textContent=a.bellOn?'🔔 Уведомления вкл':'🔕 Уведомления выкл';document.getElementById('dBell').className='act-btn bell '+(a.bellOn?'on':'off')}}
function remDet(){if(curDet){removeAcc(curDet);closeDet()}}

function renderDetGifts(u){
  const el=document.getElementById('dGifts'),a=accs.find(x=>x.username===u);if(!a)return;
  const items=hist.filter(h=>{
    const oid=h.owner_id||h.new_owner_id||h.to_owner_id||'';
    return String(oid)===String(a.id);
  });
  if(!items.length){el.innerHTML='<div class="empty"><div class="ico">🎁</div><h3>Нет истории</h3><p>Передачи подарков<br>появятся здесь</p></div>';return}
  let html='',ld2='';
  items.forEach((g,i)=>{
    const t=g.seen_at||g.date||g.created_at;
    const dl=dL(t);if(dl!==ld2){html+='<div class="day-lbl">'+dl+'</div>';ld2=dl}
    const nm=g.gift_name||g.gift_title||g.name||('Gift #'+(g.gift_id||g.id||'').toString().slice(0,8));
    const col=g.collection_name||g.collection||g.gift_collection||'';
    const fr=g.prev_owner_name||g.prev_owner_username||g.from_username||g.from_name||'—';
    const img=g.gift_image||g.image||g.thumbnail||'';
    html+='<div class="g-card" style="animation-delay:'+i*.03+'s"><div class="g-top">'
      +'<div class="g-ico">'+(img?'<img src="'+img+'" onerror="this.outerHTML=\'🎁\'">':'🎁')+'</div>'
      +'<div class="g-inf"><div class="g-ttl">'+nm+'</div>'
      +(col?'<div class="g-col">'+col+'</div>':'')
      +'<div class="g-frm">от '+fr+'</div></div></div>'
      +'<div class="g-bot"><div class="g-time">'+fT(t)+'</div><span class="g-tag">Передача</span></div></div>';
  });
  el.innerHTML=html;
}

function renderFeed(){
  const el=document.getElementById('feedSection');
  if(!hist.length){el.innerHTML='<div class="empty"><div class="ico">📭</div><h3>Лента пуста</h3><p>Добавьте аккаунты и<br>подарки появятся здесь</p></div>';return}
  let html='',ld2='';
  hist.slice(0,50).forEach((g,i)=>{
    const t=g.seen_at||g.date||g.created_at;
    const dl=dL(t);if(dl!==ld2){html+='<div class="day-lbl">'+dl+'</div>';ld2=dl}
    const oid=g.owner_id||g.new_owner_id||g.to_owner_id||'';
    const a=accs.find(x=>String(x.id)===String(oid));
    const un=a?.username||g.owner_username||g.new_owner_username||'?';
    const nm=g.gift_name||g.gift_title||g.name||'Gift';
    const fr=g.prev_owner_name||g.prev_owner_username||g.from_name||'—';
    html+='<div class="f-card" style="animation-delay:'+i*.03+'s"'+(a?' onclick="openDet(\''+un+'\')"':'')+'>'
      +'<div class="f-av '+cc(un)+'"><img src="'+avUrl(un)+'" onerror="this.style.display=\'none\'"></div>'
      +'<div class="f-body"><div class="f-l1">🎁 '+nm+' → <span class="hl">@'+un+'</span></div>'
      +'<div class="f-l2">от '+fr+'</div></div>'
      +'<div class="f-time">'+fT(t)+'</div></div>';
  });
  el.innerHTML=html;
}

async function poll(){
  for(const a of accs){
    try{
      const d=await aGet('/history',{owner_id:String(a.id),limit:'5',order:'desc'});
      const items=Array.isArray(d)?d:(d.items||d.data||d.results||[]);
      const nw=items.filter(h=>!hist.find(x=>(x.id||x._id)===(h.id||h._id)));
      if(nw.length){
        hist=nw.concat(hist);hist.sort((a,b)=>new Date(b.seen_at||b.date||0)-new Date(a.seen_at||a.date||0));
        unseen+=nw.length;updBadge();
        if(a.bellOn){toast('🎁 '+(nw[0].gift_name||'Gift')+' → @'+a.username);hap('n')}
        if(document.getElementById('pageFeed').classList.contains('active'))renderFeed();
        if(curDet===a.username)renderDetGifts(a.username);
      }
    }catch(e){}
  }
  setTimeout(poll,30000);
}

// ===== INIT =====
log('App started '+APP_VERSION);
log('Accounts loaded: '+accs.length);
renderAccs();updBadge();

(async()=>{
  // Test API connectivity
  try{
    log('Testing API...');
    await aGet('/stats');
    log('API OK — no CORS issue!');
  }catch(e){
    log('API test failed: '+e.message);
    if(e.name==='TypeError'){
      document.getElementById('debugArea').innerHTML=
        '<div class="err-box"><b>⚠️ CORS Error</b><br>Браузер блокирует запросы к see.tg.<br>Нужен серверный прокси для работы API.</div>';
    }
  }
  
  for(const a of accs)await loadHist(a.id);
  renderFeed();
  setTimeout(poll,30000);
})();
</script>
